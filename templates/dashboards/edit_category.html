{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    <!-- Left Sidebar -->
   
    <!-- Load Sidebar from dashboard_sidebar -->
     {% include 'dashboards/dashboard_sidebar.html' %}



    <!-- Right Side Content -->
    <div class="col-md-9">
        <h2>Edit Category</h2>
        
        <form action="{% url 'edit_category' category.id %}" method="post" style="width: 500px;">
            {% csrf_token %}

            {{ category_EditForm | crispy }}

            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
       
    </div>
</div>


{% endblock content %}
